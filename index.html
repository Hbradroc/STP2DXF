<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>STP2DXF Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <main class="card">
        <a class="email-link" href="mailto:hbradroc@uwo.ca">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 2v.35l-8 5.2-8-5.2V6h16ZM4 18V8.35l7.45 4.84a1 1 0 0 0 1.1 0L20 8.35V18H4Z"
            />
          </svg>
          hbradroc@uwo.ca
        </a>

        <h1>STP2DXF Converter</h1>
        <p class="sub">
          Upload a STEP file. Conversion runs in your browser — flat cut DXF and/or
          orthographic drawing DXF. Your file never leaves this page.
        </p>

        <div class="field">
          <label for="stepFile">STEP file (.stp / .step)</label>
          <input id="stepFile" type="file" accept=".stp,.step,.STP,.STEP" />
        </div>

        <div class="field">
          <label for="thickness">Sheet thickness (mm)</label>
          <input id="thickness" type="number" min="0.1" step="0.1" value="6" />
        </div>

        <div class="field">
          <label for="minArea">Minimum flat face area (mm²)</label>
          <input id="minArea" type="number" min="1" step="1" value="100" />
        </div>

        <div class="options">
          <label class="check">
            <input id="exportFlat" type="checkbox" checked />
            Export flat cut DXF (laser/plasma/waterjet)
          </label>
          <label class="check">
            <input id="exportDrawing" type="checkbox" checked />
            Export drawing DXF (front / top / right views)
          </label>
          <label class="check">
            <input id="deduplicate" type="checkbox" checked />
            Deduplicate top/bottom plate faces
          </label>
        </div>

        <button id="convertBtn" type="button">Convert and download</button>

        <pre id="log" class="log" aria-live="polite"></pre>
        <div id="downloads" class="downloads" hidden></div>
      </main>
    </div>

    <p class="footer-note">Systemair 467</p>

    <script>
      window.__pyodideIndexURL = null;
      (function () {
        const bases = [
          "https://cdn.pyodide.org/v0.26.4/full/",
          "https://cdn.jsdelivr.net/pyodide/v0.26.4/full/",
        ];
        let idx = 0;
        function tryNext() {
          if (idx >= bases.length) {
            document.getElementById("log").textContent =
              "Could not load pyodide.js from any CDN.\n" +
              "Both cdn.pyodide.org and cdn.jsdelivr.net appear blocked on this network.\n" +
              "Try opening the page on a different network or via VPN.";
            return;
          }
          const base = bases[idx++];
          const script = document.createElement("script");
          script.src = base + "pyodide.js";
          script.onload = function () {
            window.__pyodideIndexURL = base;
            const moduleScript = document.createElement("script");
            moduleScript.type = "module";
            moduleScript.src = "./app.js?v=5";
            document.body.appendChild(moduleScript);
          };
          script.onerror = tryNext;
          document.body.appendChild(script);
        }
        tryNext();
      })();
    </script>
  </body>
</html>
